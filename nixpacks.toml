[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22", "php84Extensions.gd", "php84Extensions.intl", "php84Extensions.pdo_mysql", "php84Extensions.mysqlnd", "php84Extensions.openssl", "php84Extensions.mbstring", "php84Extensions.curl", "openssl"]

[phases.install]
cacheDirectories = ["/root/.composer/cache", "/root/.npm"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader", "npm ci"]

[phases.build]
cmds = ["npm run build", "php artisan optimize"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
