[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22", "php84Extensions.gd", "php84Extensions.intl", "php84Extensions.pdo_mysql", "php84Extensions.mysqlnd", "php84Extensions.openssl", "php84Extensions.mbstring", "php84Extensions.curl", "openssl"]

[phases.install]
cacheDirectories = ["/root/.composer/cache", "/root/.npm"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "chmod -R 775 storage bootstrap/cache && php artisan storage:link --force && php artisan optimize:clear && php -d upload_max_filesize=50M -d post_max_size=50M artisan serve --host=0.0.0.0 --port=3000"
