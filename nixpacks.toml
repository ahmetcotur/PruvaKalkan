[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20", "php84Extensions.gd", "php84Extensions.intl", "php84Extensions.pdo_mysql", "php84Extensions.mysqlnd", "php84Extensions.openssl", "php84Extensions.mbstring", "php84Extensions.curl", "openssl"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
