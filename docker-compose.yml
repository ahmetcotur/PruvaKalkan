services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: pruva-web-app
        restart: always
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
        volumes:
            - storage:/var/www/html/storage/app/public
            - images:/var/www/html/public/images
        networks:
            - pruva-network
        depends_on:
            - db

    db:
        image: mysql:8.4
        restart: always
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db-data:/var/lib/mysql
            - ./full_database_dump_with_schema.sql:/docker-entrypoint-initdb.d/dump.sql
        networks:
            - pruva-network

networks:
    pruva-network:
        driver: bridge

volumes:
    storage:
    images:
    db-data:
